# .github/workflows/fav-alerts.yml
# Motor de alertas de favoritos: avisa por email de bajadas de precio y restock.
# Va en el repo PRIVADO kitfinder-automation (maneja datos de usuarios).
# Se ejecuta despues de la actualizacion semanal de tiendas.

name: Alertas de favoritos (precio y restock)

on:
  schedule:
    # 06:00 UTC del lunes (despues de tiendas, tasas, holy grails y sitemap)
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      modo_prueba:
        description: 'Email de prueba (si lo rellenas, TODOS los emails van ahi)'
        required: false
        default: ''
      dry_run:
        description: 'Solo simular (1 = no envia nada)'
        required: false
        default: '0'

jobs:
  alertas:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el codigo
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install firebase-admin

      - name: Ejecutar motor de alertas
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TEST_EMAIL: ${{ github.event.inputs.modo_prueba }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: python fav_alerts.py
